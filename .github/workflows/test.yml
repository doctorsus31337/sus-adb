name: Test
on: [push, pull_request]
permissions: {contents: read}
jobs:
  test:
    strategy: {matrix: {os: [ubuntu-latest, windows-latest], python: ['3.11', '3.13']}}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '${{ matrix.python }}', cache: pip}
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: python -m compileall -q app main.py
      - run: python main.py --self-test
      - run: python scripts/audit_release.py
      - if: runner.os == 'Linux'
        run: xvfb-run -a python scripts/run_gui_smoke.py
